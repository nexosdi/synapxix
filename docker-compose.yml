version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_shered
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synapxix_db
    ports:
      - "5433:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
