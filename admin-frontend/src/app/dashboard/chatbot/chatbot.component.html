<button 
  class="chat-fab" 
  (click)="toggleChat()"
  [class.active]="isChatOpen">
  <span class="material-symbols-outlined fab-icon">
    {{ isChatOpen ? 'close' : 'smart_toy' }}
  </span>
</button>

<div class="chat-widget" [class.hidden-widget]="!isChatOpen">
  <header class="chat-header">
    <div class="header-info">
      <div class="avatar-container">
        <img alt="AI Friend" class="avatar-img" src="/logo.png" />
      </div>
      <h1 class="chat-title">Tu amigo Synapsis</h1>
    </div>
    
    <div class="header-actions">
      <button class="action-btn clear-btn" (click)="clearChat()" title="Limpiar Chat">
        <span class="material-symbols-outlined">delete_sweep</span>
      </button>
      <button class="action-btn close-btn" (click)="closeChat()" title="Cerrar">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  </header>

  <main class="message-list" #messageContainer>
    <ng-container *ngFor="let msg of messages">
      <div class="message-row ai-row" *ngIf="msg.type === 'ai'">
        <div class="message-bubble ai-bubble">
          <p class="message-text">{{ msg.text }}</p>
          <span class="message-time">{{ msg.time }}</span>
        </div>
      </div>

      <div class="message-row user-row" *ngIf="msg.type === 'user'">
        <div class="message-bubble user-bubble">
          <p class="message-text">{{ msg.text }}</p>
          <span class="message-time">{{ msg.time }}</span>
        </div>
      </div>
    </ng-container>

    <div class="thinking-indicator" *ngIf="isTyping">
      <div class="thinking-bubble">
        <div class="bouncy-dots">
          <span></span>
          <span class="delay-1"></span>
          <span class="delay-2"></span>
        </div>
        <p class="thinking-text">{{ indicatorText }}</p>
      </div>
    </div>
  </main>

  <footer class="chat-footer">
    <div class="chip-row" *ngIf="hasAiResponse">
      <button class="suggested-chip" (click)="sendMessage('¡Sí, me encantaría!')">¡Sí, me encantaría!</button>
      <button class="suggested-chip" (click)="sendMessage('Ver otros juegos')">Ver otros juegos</button>
    </div>
    
    <div class="input-area">
      <div class="input-wrapper">
        <input 
          class="chat-input" 
          placeholder="Escribe aquí..." 
          type="text" 
          [value]="inputText"
          (input)="onInputChange($event)"
          (keydown.enter)="onInputEnter($event)" />
      </div>
      <button class="send-btn" (click)="sendMessage(inputText)">
        <span class="material-symbols-outlined">send</span>
      </button>
    </div>
  </footer>
</div>
